<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interplay Engine</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<div id="app">

    <!-- TOP NAV -->
    <nav id="topnav">
        <div class="nav-left">
            <label class="nav-btn" for="vocalFile">VOCAL</label>
            <input type="file" id="vocalFile" accept=".mp3,.wav,audio/*">
            <label class="nav-btn" for="drumFile">DRUM</label>
            <input type="file" id="drumFile" accept=".mp3,.wav,audio/*">
            <span id="vocalName" class="nav-tag">no file</span>
            <span class="nav-dot">·</span>
            <span id="drumName" class="nav-tag">no file</span>
        </div>
        <div class="nav-center">
            <span id="projectTitle">INTERPLAY ENGINE</span>
        </div>
        <div class="nav-right">
            <span id="bpmDisplay" class="nav-tag">-- BPM</span>
            <button class="nav-btn" id="analyzeBtn" onclick="handleAnalyze()" disabled>ANALYZE</button>
            <button class="nav-btn dim" onclick="runDemo()">DEMO</button>
        </div>
    </nav>

    <!-- STATUS -->
    <div id="statusBar"><span id="status">Load stems or hit DEMO</span></div>

    <!-- WAVEFORM DISPLAY -->
    <div id="waveStation">
        <div id="waveLabel">
            <input id="lyricInput" type="text" placeholder="type lyric or label..." maxlength="80">
        </div>
        <canvas id="waveCanvas"></canvas>
        <canvas id="specCanvas"></canvas>
    </div>

    <!-- SEQUENCER -->
    <div id="sequencer">
        <div id="seqGrid">
            <div class="seq-controls">
                <div class="dial"></div>
                <div class="instrument-labels">
                    <div class="seq-row-label"><span class="row-label">KICK</span></div>
                    <div class="seq-row-label"><span class="row-label">SNARE</span></div>
                    <div class="seq-row-label"><span class="row-label">HI-HAT</span></div>
                    <div class="seq-row-label"><span class="row-label">PERC</span></div>
                </div>
            </div>
            <div class="seq-rows-container">
                <div class="seq-row" id="row-kick"> <div class="row-cells" id="cells-kick"></div></div>
                <div class="seq-row" id="row-snare"><div class="row-cells" id="cells-snare"></div></div>
                <div class="seq-row" id="row-hihat"><div class="row-cells" id="cells-hihat"></div></div>
                <div class="seq-row" id="row-perc"> <div class="row-cells" id="cells-perc"></div></div>
                <div id="seqRuler"></div>
            </div>
        </div>
    </div>

    <!-- ANALYSIS PANELS (hidden) -->
    <div id="panels" style="display: none;">

        <section class="panel" id="panel-forensics">
            <div class="panel-header">01 — FILE FORENSICS</div>
            <div class="forensics-grid">
                <div class="forensic-col">
                    <div class="col-label vocal-color">VOCAL</div>
                    <div id="vocal-stats"></div>
                    <canvas id="vocalWaveform" height="60"></canvas>
                </div>
                <div class="forensic-col">
                    <div class="col-label drum-color">DRUM</div>
                    <div id="drum-stats"></div>
                    <canvas id="drumWaveform" height="60"></canvas>
                </div>
            </div>
        </section>

        <section class="panel" id="panel-examination">
            <div class="panel-header">02 — DEEP EXAMINATION</div>
            <div class="exam-grid">
                <div class="exam-block"><div class="block-label">Vocal Energy</div><canvas id="vocalEnergy"></canvas></div>
                <div class="exam-block"><div class="block-label">Drum Energy</div><canvas id="drumEnergy"></canvas></div>
                <div class="exam-block"><div class="block-label">Vocal Freq Bands</div><canvas id="vocalBands"></canvas></div>
                <div class="exam-block"><div class="block-label">Drum Freq Bands</div><canvas id="drumBands"></canvas></div>
            </div>
        </section>

        <section class="panel" id="panel-interplay">
            <div class="panel-header">03 — INTERPLAY</div>
            <div class="exam-grid">
                <div class="exam-block"><div class="block-label">Latency Map</div><canvas id="interplayChart"></canvas></div>
                <div class="exam-block"><div class="block-label">Energy Overlap</div><canvas id="energyOverlap"></canvas></div>
                <div class="exam-block full-width"><div class="block-label">Onset Sync Timeline</div><canvas id="onsetSync"></canvas></div>
            </div>
        </section>

    </div>
</div>
<script src="analyzer.js" defer></script>
</body>
</html>
