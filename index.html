<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadence-Beat Interplay Engine</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div id="app">
        <header>
            <h1>Cadence-Beat Interplay Engine</h1>
            <p class="subtitle">Vocal × Drum Stem Analysis</p>
        </header>

        <div id="upload-zone">
            <label class="stem-upload" for="vocalFile">
                <div class="stem-label">VOCAL STEM</div>
                <input type="file" id="vocalFile" accept=".mp3,.wav,audio/*">
                <div class="file-name" id="vocalName">Tap to load vocal stem</div>
            </label>
            <div class="stem-divider">×</div>
            <label class="stem-upload" for="drumFile">
                <div class="stem-label">DRUM STEM</div>
                <input type="file" id="drumFile" accept=".mp3,.wav,audio/*">
                <div class="file-name" id="drumName">Tap to load drum stem</div>
            </label>
        </div>

        <div id="action-bar">
            <button id="analyzeBtn" onclick="handleAnalyze()" disabled>Analyze</button>
            <button id="demoBtn" onclick="runDemo()">Demo Mode</button>
        </div>

        <div id="status-bar">
            <span id="status"></span>
            <span id="progress"></span>
        </div>

        <section class="panel" id="panel-forensics">
            <div class="panel-header">01 — File Forensics</div>
            <div class="forensics-grid">
                <div class="forensic-col">
                    <div class="col-label">VOCAL</div>
                    <div id="vocal-stats"></div>
                    <canvas id="vocalWaveform" height="80"></canvas>
                </div>
                <div class="forensic-col">
                    <div class="col-label">DRUM</div>
                    <div id="drum-stats"></div>
                    <canvas id="drumWaveform" height="80"></canvas>
                </div>
            </div>
        </section>

        <section class="panel" id="panel-examination">
            <div class="panel-header">02 — Deep Examination</div>
            <div class="exam-grid">
                <div class="exam-block">
                    <div class="block-label">Vocal Energy Over Time</div>
                    <canvas id="vocalEnergy"></canvas>
                </div>
                <div class="exam-block">
                    <div class="block-label">Drum Energy Over Time</div>
                    <canvas id="drumEnergy"></canvas>
                </div>
                <div class="exam-block">
                    <div class="block-label">Vocal Frequency Bands</div>
                    <canvas id="vocalBands"></canvas>
                </div>
                <div class="exam-block">
                    <div class="block-label">Drum Frequency Bands</div>
                    <canvas id="drumBands"></canvas>
                </div>
            </div>
        </section>

        <section class="panel" id="panel-interplay">
            <div class="panel-header">03 — Interplay Analysis</div>
            <div id="interplay-scores"></div>
            <div class="interplay-grid">
                <div class="exam-block">
                    <div class="block-label">Latency Map</div>
                    <canvas id="interplayChart"></canvas>
                </div>
                <div class="exam-block">
                    <div class="block-label">Energy Overlap</div>
                    <canvas id="energyOverlap"></canvas>
                </div>
                <div class="exam-block full-width">
                    <div class="block-label">Onset Sync Timeline</div>
                    <canvas id="onsetSync"></canvas>
                </div>
            </div>
        </section>
    </div>
    <script src="analyzer.js"></script>
</body>
</html>
